services:
  cypulse:
    build: .
    image: ghcr.io/cypulse/cypulse:latest
    volumes:
      - ./data:/app/data
      - ./config:/app/config
    env_file:
      - path: .env
        required: false
    environment:
      - CYPULSE_OUTPUT_DIR=/app/data
      - CYPULSE_LOG_LEVEL=INFO
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 4G
    healthcheck:
      test: ["CMD", "python", "-m", "cypulse", "--help"]
      interval: 30s
      timeout: 10s
      start_period: 10s
